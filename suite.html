<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Your Life Suite</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
const {useState, useEffect, useRef, useCallback} = React;
fetch('CommandYourLifeSuite.jsx')
  .then(r => r.text())
  .then(code => {
    code = code.replace(/^import\s+.*?from\s+['"]react['"];?.*$/gm, '');
    code = code.replace(/export\s+default\s+function/g, 'function');
    code += '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));';
    const el = document.createElement('script');
    el.type = 'text/babel';
    el.textContent = code;
    document.body.appendChild(el);
    Babel.transformScriptTags();
  });
</script>
</body>
</html>
